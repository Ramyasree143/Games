<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog Search</title>
</head>
<body>

    <input type="text" id="breed" placeholder="Enter dog breed">

    <button onclick="getDog()">Search</button>

    <h2 id="breedName"></h2>

    <img id="dogImage" width="300">

    <script>
        async function getDog() {
            try {

                const breed = document.getElementById("breed").value.toLowerCase();

                const response = await fetch(
                    `https://dog.ceo/api/breed/${breed}/images/random`
                );

                const data = await response.json();

                if (data.status !== "success") {
                    throw new Error("Breed not found");
                }

                document.getElementById("dogImage").src = data.message;
                document.getElementById("breedName").textContent = breed;

            } catch (err) {

                document.getElementById("breedName").textContent = err.message;
                document.getElementById("dogImage").src = "";
            }
        }
    </script>

</body>
</html>
